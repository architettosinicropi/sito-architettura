<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://www.antoninosinicropi.it/" />
    
    <link rel="alternate" hreflang="it" href="https://www.antoninosinicropi.it/it/home.html" />
    <link rel="alternate" hreflang="en" href="https://www.antoninosinicropi.it/en/home.html" />
    <link rel="alternate" hreflang="x-default" href="https://www.antoninosinicropi.it/" />

    <title>Antonino Sinicropi | Architetto Ph.D.</title>

    <script>
        // Controlla se l'utente ha già fatto una scelta manuale in precedenza
        const langPicked = localStorage.getItem('langPicked');

        if (!langPicked) {
            // Rileva la lingua del browser
            const browserLang = navigator.language || navigator.userLanguage;
            
            // Se la lingua NON è italiano, reindirizza istantaneamente alla home inglese
            if (!browserLang.startsWith('it')) {
                window.location.replace('https://www.antoninosinicropi.it/en/home.html');
            }
        }
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CDK82JBQ2Z"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-CDK82JBQ2Z');
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="no-scroll">

    <main class="splash">
        <div class="splash-center fade-in">
            <h1>ANTONINO SINICROPI</h1>
            
            <div class="lang-selection">
                <button class="btn-lang" onclick="localStorage.setItem('langPicked', 'it'); location.href='https://www.antoninosinicropi.it/it/home.html'">
                    <div class="btn-content">
                        <span class="lang-title">ITALIANO</span>
                        <span class="lang-slogan">Progettare il futuro attraverso la memoria e l'inclusione</span>
                    </div>
                </button>
                
                <button class="btn-lang" onclick="localStorage.setItem('langPicked', 'en'); location.href='https://www.antoninosinicropi.it/en/home.html'">
                    <div class="btn-content">
                        <span class="lang-title">ENGLISH</span>
                        <span class="lang-slogan">Designing the future through heritage and inclusion</span>
                    </div>
                </button>
            </div>
        </div>
    </main>

    <footer class="legal-footer-splash">
        <a href="privacy-policy.html" class="mini-privacy-btn">Privacy Policy</a>
    </footer>

</body>
</html>
